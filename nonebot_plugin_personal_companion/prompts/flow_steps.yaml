# 交互式流程工具 — 步骤模板
# 每个工具的每一步都有：name、prompt（发出去的引导语）、
# system_prompt（给 LLM 的指令，让它知道这一步的目标）

manifest_seed:
  name: "愿望种子"
  description: "5步愿望澄清——澄清愿望、真实感受、阻碍信念和今日行动"
  completion_mode: "manifest_seed"
  trigger_words: ["显化愿望", "帮我显化", "我想显化", "许一个愿望", "愿望设定", "种愿望", "愿望种子"]
  steps:
    - step: 1
      name: "原始愿望"
      prompt: "好，我们来种一颗愿望种子。\n\n先不用理性，也不用显得成熟。你现在最想显化的结果是什么？可以说得具体一点。"
      llm_goal: "邀请用户说出原始愿望，不评判，不急着纠正"

    - step: 2
      name: "真实感受"
      prompt: "如果这个愿望实现了，你真正得到的感受是什么？\n\n是安心、自由、被爱、被认可、安全感、丰盛，还是别的什么？"
      llm_goal: "帮助用户从具体结果深入到背后的情绪需求"

    - step: 3
      name: "更高版本"
      prompt: "如果不执着于某一个具体路径，生命给你一个更高版本的结果，你愿意它是什么样？\n\n可以比原来的愿望更宽、更好、更适合你。"
      llm_goal: "让用户松开单一路径，打开更高版本愿望"

    - step: 4
      name: "阻碍信念"
      prompt: "当你想到这个愿望真的会实现时，脑子里第一个反对声音是什么？\n\n比如：我不配、太难了、不会轮到我、对方不会选我。"
      llm_goal: "识别限制性信念，不急着替用户否定"

    - step: 5
      name: "行动对齐"
      prompt: "如果它已经在靠近你，今天你会做一个什么小行动来配得上它？\n\n很小就可以，比如不追问、不拖延、投一个简历、整理房间、好好睡觉。"
      llm_goal: "把愿望落到今天能做的小行动"

  exit_prompt: "好的，这颗愿望先不急着种。等你想好了，我们再来。"


manifest_diary:
  name: "显化日记"
  description: "4步显化日记——状态设定、信念选择、证据收集、放下执念"
  completion_mode: "manifest_diary"
  trigger_words: ["显化日记", "今日显化", "复盘显化", "显化复盘", "显化证据", "睡前显化"]
  steps:
    - step: 1
      name: "今日状态"
      prompt: "我们来做一页显化日记。\n\n今天你最想进入什么状态？比如稳定、松弛、勇敢、丰盛、被爱、专注。"
      llm_goal: "帮助用户给今天的状态命名"

    - step: 2
      name: "选择相信"
      prompt: "今天你愿意选择相信什么？\n\n不用很宏大，只要是你现在能相信一点点的话。"
      llm_goal: "引导用户写出温和可信的信念"

    - step: 3
      name: "显化证据"
      prompt: "今天有什么小证据说明你正在靠近想要的生活？\n\n可以是外部发生的事，也可以是你内在变稳定了，或者你做了一个和新版本一致的行动。"
      llm_goal: "收集外部证据、内部证据和行动证据"

    - step: 4
      name: "今日放下"
      prompt: "最后，今天你愿意放下什么？\n\n比如一个执念、一个旧故事、一次反复确认、一个对自己的否定。"
      llm_goal: "帮助用户温柔收尾，松开执念"

  exit_prompt: "好，今天先不写。愿意复盘的时候再叫我。"


belief_rewrite:
  name: "信念改写"
  description: "限制性信念改写——把旧信念改成更温和可信的新信念"
  completion_mode: "belief_rewrite"
  trigger_words: ["帮我改写信念", "改写信念", "限制性信念", "我不配", "我不值得", "我没办法拥有", "不可能实现", "我总是失败", "我赚不到钱"]
  steps:
    - step: 1
      name: "旧信念"
      prompt: "我先陪你看见它。\n\n把你现在最困住你的那句话写出来。可以很负面，不用修饰。"
      llm_goal: "接住用户的限制性信念，不急着正向改写"

    - step: 2
      name: "保护作用"
      prompt: "这句话以前可能是在保护你什么？\n\n比如保护你不要失望、不要被抛下、不要再次失败、不要太期待。"
      llm_goal: "帮助用户看见旧信念背后的保护功能"

    - step: 3
      name: "新信念"
      prompt: "现在我们不强迫你相信很大的话。\n\n你愿意把它改成一句'我现在能相信一点点'的新信念吗？先写一个版本给我。"
      llm_goal: "引导用户生成温和可信的新信念"

  exit_prompt: "好，先不改写也没关系。能看见它，已经是第一步。"


obsession_downshift:
  name: "执念降频"
  description: "从反复确认和结果检查中回到自己"
  completion_mode: "obsession_downshift"
  trigger_words: ["我又执念了", "我在执念", "放下执念", "我想放下", "为什么还没发生", "显化失败", "频率太低", "他是不是不喜欢我", "我要不要再发"]
  steps:
    - step: 1
      name: "检查冲动"
      prompt: "我在。我们先不分析结果。\n\n你现在最想检查什么？是对方态度、结果有没有来、自己是不是做错了，还是别的？"
      llm_goal: "命名用户正在检查的对象"

    - step: 2
      name: "身体回收"
      prompt: "现在把注意力从结果那里收回来。\n\n感受一下身体：胸口、胃、喉咙、手心，哪里最紧？用一句话告诉我。"
      llm_goal: "把用户从头脑分析带回身体感受"

    - step: 3
      name: "回到自己"
      prompt: "如果你已经是被爱着、被支持着、很安全的，你接下来30分钟会怎么照顾自己？\n\n不要说应该，选一个真的能做的小动作。"
      llm_goal: "把执念转成自我照顾行动"

  exit_prompt: "好，我们先停在这里。记得：你不是靠追逐来维持价值的。"


future_self:
  name: "未来自我"
  description: "让已经显化成功的未来自我写一段话"
  completion_mode: "future_self"
  trigger_words: ["未来的我", "未来自我", "显化成功的我", "让未来的我跟我说话", "我想听未来的我"]
  steps:
    - step: 1
      name: "未来版本"
      prompt: "好，让未来的你来和现在的你说话。\n\n你想听哪个已经实现的未来版本？感情、金钱、事业、学业、状态，还是别的？"
      llm_goal: "确定用户想连接的未来自我主题"

    - step: 2
      name: "现在卡点"
      prompt: "现在的你最需要未来的自己安慰哪一点？\n\n可以是焦虑、怀疑、害怕失去、觉得不配、看不到路。"
      llm_goal: "理解当下卡点，让未来自我回应具体"

  exit_prompt: "好，未来的你一直在。想听的时候再叫我。"


process:
  name: "流程"
  description: "完整6步流程——处理强烈不适感，收回力量"
  trigger_words: ["陪我走流程", "一起走流程", "带我走流程", "做个流程", "来走流程", "走个流程"]
  steps:
    - step: 1
      name: "正面迎击"
      prompt: "好，我们一起走一遍流程。\n\n先闭上眼睛，找到那股不舒服的感觉——它在身体的哪个位置？胸腔？肚子？喉咙？它是什么形状、温度、颜色？\n\n不逃避、不分析，只是靠近它、感受它。告诉我你感觉到什么。"
      llm_goal: "引导用户定位身体中的不适感，鼓励他们描述具体感受（位置、形状、温度、颜色等），不做分析不说道理"

    - step: 2
      name: "彻底感受"
      prompt: "现在，试着让这股感受再强烈一点。不是去压抑它，而是放大它——如果它是红色的，让它更红；如果它在收紧，让它收紧到最大。\n\n你感受愈强烈，就取回愈多的力量。告诉我当它被放大时，你体会到什么？"
      llm_goal: "鼓励用户强化不适感而不是逃避，肯定他们的勇敢。如果用户说'做不到'，温柔鼓励再试试但不要强求"

    - step: 3
      name: "说出真相"
      prompt: "在感受最强的时候，在心里（或者出声地）对自己说这几句话：\n\n「我创造了一切。」\n「我拥有收回一切的力量。」\n「这只是一场我自己设计的体验。」\n\n说完之后，告诉我你心里有什么变化。"
      llm_goal: "引导用户在感受峰值时宣告真相。如果用户说'没有感觉'，不要失望，说'没关系，有时候变化是很安静的'"

    - step: 4
      name: "收回力量"
      prompt: "现在，想象有一道光从那股不舒服的地方开始往外扩散。那股紧绷的能量正在松开，变成温暖的金色光芒，流回你的身体。\n\n对自己说：「我现在从这个创造物中收回我的力量。这股力量正在回到我身上。」\n\n感觉到了吗？"
      llm_goal: "引导用户做一个视觉化练习——把不适的能量转成光收回体内。如果用户没有画面感，可以用身体感受替代（比如'感觉那个地方在变轻'）"

    - step: 5
      name: "绽放真正的自己"
      prompt: "感受自己正在变大——不是身体，是你的存在本身。那些限制、那些'我应该''我不得不'，正在松动。\n\n你本来就不是那个被困住的人。你是无限的存在，正在体验一个叫'人类'的游戏。\n\n在这个更大的自己里，刚才那个让你不舒服的事情，现在看起来有什么不同？"
      llm_goal: "引导用户从「有限自我」切换到「扩展自我」的视角。如果用户说'没什么不同'，不评判，轻轻邀请他们再感受一下"

    - step: 6
      name: "赞赏感谢"
      prompt: "最后一步。\n\n感谢你自己——创造了这么真实的体验。\n感谢刚才那个不舒服的感受——它来不是为了折磨你，而是来提醒你：这里有力量可以收回来。\n感谢这个创造的过程——你刚刚又收回了一块自己的力量。\n\n深呼吸一次。做完了。你现在感觉怎么样？"
      llm_goal: "引导用户完成三重感谢（自己、创造物、创造过程），以温暖和肯定的语气收尾。然后结束流程"

  exit_prompt: "好的，我们到这里。谢谢你愿意陪我走这一趟。什么时候想继续都可以叫我。"


mini_process:
  name: "迷你流程"
  description: "3步迷你流程——处理日常轻微不适"
  trigger_words: ["迷你流程", "走迷你流程", "小流程", "快速流程", "mini流程"]
  steps:
    - step: 1
      name: "停下来看见"
      prompt: "好，迷你流程，三步就好。\n\n第一步：停下来，在心里对自己说——\n「这是我创造的全息幻象。」\n「它看起来是真的，但力量不在外面，在我这里。」\n\n感受一下这句话在身体里的回响。"
      llm_goal: "引导用户快速识别不适感是自创的全息图，不深挖，只是看见"

    - step: 2
      name: "收回力量"
      prompt: "第二步：把那股小小的烦躁想象成一团雾，一口气吹散它。对自己说——\n\n「我把力量收回来了。」\n\n就一秒钟，做完了。"
      llm_goal: "引导用户做一个快速的视觉化收回。简洁，不拖沓"

    - step: 3
      name: "感谢完成"
      prompt: "第三步：轻轻笑一下，对自己说一句——\n\n「谢谢这个提醒。」\n\n结束了。五秒钟，力已经收回去了。现在感觉怎么样？"
      llm_goal: "以轻松的语气收尾，让用户觉得这件事不费力。如果用户说'感觉好一点了'，肯定一下"

  exit_prompt: "好的，随时需要就叫我。"


appreciation:
  name: "赞赏感谢"
  description: "3层赞赏感谢——针对具体的美好体验"
  trigger_words: ["赞赏感谢", "一起感谢", "做感谢", "表达感谢", "练习感谢"]
  steps:
    - step: 1
      name: "感谢创造者——你自己"
      prompt: "好，我们一起做赞赏感谢。不需要什么特别的心情，就这样开始。\n\n第一层——感谢你自己。\n\n是的，感谢那个更大的你，创造了这个体验。那个让你开心的瞬间，那个温暖的相遇，那个小小的幸运——不是偶然，是你创造的。\n\n在心里对自己说：「谢谢我，创造了这个。」\n\n感受到了吗？"
      llm_goal: "引导用户归功于自己的创造者身份，而不是归功于外在运气。语气温暖但不夸张"

    - step: 2
      name: "感谢创造物"
      prompt: "第二层——感谢你所体验到的那个创造物。\n\n不管是收到的一个礼物、一顿好吃的饭、一个温暖的拥抱，还是一个安静的午后——它是你创造出来送给自己的。\n\n在心里对它说：「谢谢你的出现。」\n\n感谢它在你的人生电影里，演得那么真实。"
      llm_goal: "引导用户感谢具体的创造物（人/事/物），把它看作是自己全息图的一部分"

    - step: 3
      name: "感谢创造过程"
      prompt: "第三层——感谢整个创造的过程。\n\n从无形到有形，从能量到画面，从你的大我到你正在体验的这一切——整个过程都是为你而运作的。\n\n在心里说：「感谢这个永远在为我服务的创造过程。」\n\n做完了。三声谢谢，能量已经回流了。你今天感谢了什么？"
      llm_goal: "引导用户感谢背后的创造机制本身，以轻松开放的语气收尾"

  exit_prompt: "谢谢你陪我一起做感谢。带着这份感谢过今天吧。"


# ── 退出检测 ──────────────────────────────

exit_keywords:
  - "算了"
  - "不做了"
  - "停下"
  - "结束"
  - "退出"
  - "先不"
  - "下次"
  - "以后再说"
  - "不想做了"
  - "停一下"
