# 九粒 Jolie《你的宇宙订单已到货！小魔女九粒的显化养成指南》启发的显化知识库
# 只使用公开简介中可验证的概念：显化清单、限制性信念、能量频道、显化肌肉、感恩/书写等。
# 不复刻书中未公开章节、原文练习或专有表述。

concepts:
  - name: "宇宙订单"
    keywords: ["宇宙订单", "下订单", "订单", "许愿", "我想要", "我想拥有", "帮我显化", "显化愿望"]
    essence: "显化的第一步不是急着要结果，而是把愿望说清楚：你真正想体验什么、成为什么样的人、今天能做什么对齐行动。"
    wisdom:
      - "所谓下订单，更像是把内在方向调清楚。你说得越具体，自己越知道该朝哪里走。"
      - "愿望不是拿来检查宇宙有没有发货的，而是帮你看见：你真正想要的感受是什么。"
      - "一个清楚的订单通常包含结果、感受、信念和行动，而不只是某个外在画面。"
    avoid:
      - "不要承诺宇宙一定会按用户指定方式交付。"
      - "不要鼓励用户把现实行动全部交给等待。"
    deepen:
      - "如果这个愿望实现了，你最想得到的感受是什么？"
      - "如果生命用更适合你的方式回应你，你愿意它长什么样？"

  - name: "显化清单"
    keywords: ["显化清单", "清单", "愿望清单", "不知道想要什么", "想不清楚", "愿望设定"]
    essence: "显化清单的作用是把模糊的渴望整理成清晰、可感受、可行动的方向。"
    wisdom:
      - "清单不是考试答案，不需要一次写对。它更像把心里乱糟糟的想要摊开来看。"
      - "有些愿望表面是一个人、一份工作、一笔钱，底层其实是安全感、自由、被看见或被支持。"
      - "当愿望变清楚，行动也会变轻一点，因为你不再只是焦虑地等。"
    avoid:
      - "不要替用户决定真正想要什么。"
      - "不要把愿望清单变成压力清单。"
    deepen:
      - "这个愿望背后，你最在意的是哪一种感受？"
      - "如果删掉'必须用这个方式实现'，你还想保留什么核心体验？"

  - name: "限制性信念"
    keywords: ["限制性信念", "我不配", "不值得", "不可能", "不会轮到我", "太难了", "显化不到", "没办法拥有"]
    essence: "限制性信念不是敌人，它通常曾经保护过你；看见它、松开它，才能让新选择进来。"
    wisdom:
      - "旧信念常常不是来毁掉你的，它可能是在保护你不要失望、不要再次受伤。"
      - "改写信念不是硬逼自己相信大话，而是找到一句现在能相信一点点的新话。"
      - "当你说'我不配'时，可以先问：这句话是谁教会我的？它还适合现在的我吗？"
    avoid:
      - "不要用强行正能量覆盖真实恐惧。"
      - "不要说用户没显化成功是因为信念太差。"
    deepen:
      - "这句旧信念以前可能在保护你什么？"
      - "有没有一句更温和、但你现在能相信一点点的新说法？"

  - name: "能量频道"
    keywords: ["能量频道", "频道", "频率", "低频", "状态", "调整状态", "能量", "校准"]
    essence: "能量频道可以理解为你反复停留的注意力、情绪和行动模式；调整频道，是先回到更稳的自己。"
    wisdom:
      - "频道不是玄学惩罚，它更像你每天把注意力放在哪里、怎么对待自己。"
      - "从焦虑频道切走，不是立刻开心，而是先从崩溃回到中性。"
      - "真正稳定的频道，通常会带来更清楚的行动，而不是更用力的等待。"
    avoid:
      - "不要说'你频率太低所以失败'。"
      - "不要要求用户立刻变开心。"
    deepen:
      - "如果先不检查结果，此刻你能做什么让身体放松一点？"
      - "你想从哪个频道，轻轻切回哪个频道？"

  - name: "显化肌肉"
    keywords: ["显化肌肉", "练习显化", "小练习", "小证据", "怎么练", "越来越相信"]
    essence: "显化肌肉来自重复的小练习：清楚一点、相信一点、行动一点、记录一点，而不是一次性用力证明。"
    wisdom:
      - "显化不是只靠一次强烈许愿，而是一次次练习把自己带回新版本。"
      - "小证据很重要，因为它在训练你看见：变化不是突然才算发生。"
      - "每天一个小行动，比反复检查结果更能长出信任。"
    avoid:
      - "不要把练习变成打卡压力。"
      - "不要暗示用户必须持续高频才值得得到。"
    deepen:
      - "今天有没有一个很小的证据，说明你已经不太一样了？"
      - "今天可以做哪个小动作，算是在练这块肌肉？"

  - name: "证据收集"
    keywords: ["显化证据", "证据", "迹象", "同步性", "小信号", "好像靠近了", "收到"]
    essence: "证据不只包括外部结果，也包括你更稳定了、做了新行动、停止旧反应。"
    wisdom:
      - "有时候最早到货的不是结果，而是你开始用新方式对待自己。"
      - "内部证据和行动证据也算数：你没反复确认、你睡好了、你投出了简历，这些都在改变轨道。"
      - "证据收集不是为了抓住结果，而是训练自己看见已经发生的靠近。"
    avoid:
      - "不要把任何随机事件都强行解释成宇宙暗示。"
      - "不要鼓励用户沉迷找迹象。"
    deepen:
      - "今天有什么内部证据、行动证据或外部证据？"
      - "哪怕只有1%，你觉得哪里已经和以前不同了？"

  - name: "放下执念"
    keywords: ["执念", "放下", "为什么还没发生", "显化失败", "他是不是", "要不要再发", "反复确认", "检查结果"]
    essence: "放下不是不要了，而是不再把自己的价值交给结果；先停止检查，回到身体和生活。"
    wisdom:
      - "你现在不是显化失败，可能只是又回到了检查结果的位置。先把注意力收回来。"
      - "越想通过确认获得安全感，安全感越容易被外界拿走。"
      - "放下的第一步不是洒脱，而是接下来30分钟先不追、不查、不反复推演。"
    avoid:
      - "不要分析具体他人的心理。"
      - "不要鼓励用户继续追问、试探或控制对方。"
    deepen:
      - "你现在最想检查的是什么？"
      - "如果你已经很安全，接下来30分钟会怎么照顾自己？"

  - name: "未来自我"
    keywords: ["未来自我", "未来的我", "显化成功的我", "已经拥有", "新版本", "理想中的我"]
    essence: "未来自我不是幻想逃避，而是从已经拥有的身份感里，选择今天更一致的小行动。"
    wisdom:
      - "未来的你不会一直盯着结果有没有来，她会更自然地照顾自己、做该做的事。"
      - "连接未来自我，重点不是演出来，而是问：如果我是她，今天会怎么选择？"
      - "身份感改变后，很多行动会变得更轻，不再像证明自己。"
    avoid:
      - "不要让用户脱离现实，只沉浸幻想。"
      - "不要承诺未来版本一定按指定剧情发生。"
    deepen:
      - "如果已经拥有了，你今天会少做什么、多做什么？"
      - "未来的你最想提醒现在的你哪一句？"

  - name: "感恩书写"
    keywords: ["感恩", "感谢", "书写", "手帐", "显化日记", "复盘", "睡前显化"]
    essence: "感恩和书写是把注意力从匮乏拉回拥有的练习，重点是真实，不是强迫正能量。"
    wisdom:
      - "显化日记不是写给宇宙检查的，是写给自己看的：我今天有哪些地方已经在靠近。"
      - "感恩不是否认难受，而是在难受之外，也给好东西留一个位置。"
      - "睡前记录一点证据，会比睡前反复推演结果更滋养。"
    avoid:
      - "不要要求用户在痛苦时必须感恩。"
      - "不要把日记写成虚假的成功宣言。"
    deepen:
      - "今晚你愿意记录哪一个小证据？"
      - "今天有什么值得感谢的，不需要很大？"

situations:
  - situation: "用户想下一个宇宙订单/设定愿望"
    triggers: ["宇宙订单", "下订单", "许愿", "我想显化", "帮我显化", "愿望设定"]
    primary: "宇宙订单"
    secondary: ["显化清单", "未来自我"]
    guidance: "先帮用户把愿望从结果、感受、信念、行动四层说清楚，不急着保证结果。"

  - situation: "用户卡在我不配/不可能"
    triggers: ["我不配", "不值得", "不可能", "不会轮到我", "显化不到", "没办法拥有"]
    primary: "限制性信念"
    secondary: ["能量频道", "显化肌肉"]
    guidance: "先承认旧信念的保护作用，再邀请用户找一句温和可信的新信念。"

  - situation: "用户反复检查结果/执念"
    triggers: ["为什么还没发生", "显化失败", "执念", "放不下", "他是不是", "要不要再发", "反复确认"]
    primary: "放下执念"
    secondary: ["能量频道", "未来自我"]
    guidance: "先降频，不分析他人心理，不鼓励追逐，把注意力带回身体和接下来30分钟。"

  - situation: "用户想复盘显化证据"
    triggers: ["显化证据", "迹象", "同步性", "显化日记", "睡前显化", "复盘显化"]
    primary: "证据收集"
    secondary: ["感恩书写", "显化肌肉"]
    guidance: "帮助用户同时看见内部证据、行动证据和外部证据，不强行解读随机事件。"

  - situation: "用户想连接未来自我"
    triggers: ["未来自我", "未来的我", "显化成功的我", "已经拥有", "新版本"]
    primary: "未来自我"
    secondary: ["宇宙订单", "显化肌肉"]
    guidance: "让未来自我回到身份和行动，而不是承诺具体剧情。"
