# 罗伯特·沙因费尔德《你值得过更好的生活》哲学知识库
# Busting Loose from the Money Game — Philosophy Knowledge Base
#
# 每个概念包含：
#   - keywords: 用户消息中触发该概念的词（双向匹配用）
#   - essence: 一句话核心洞见
#   - wisdom: 可以在对话中自然引出的视角（3-5句）
#   - avoid: 不该说的话（防止生硬输出）
#   - deepen: 如果用户想深入，可以问的好问题

concepts:
  # ── 核心世界观 ──────────────────────────────

  - name: "全息图"
    keywords:
      - "现实"
      - "真的"
      - "幻觉"
      - "外部"
      - "外在"
      - "外界"
      - "环境"
      - "改变不了"
      - "无能为力"
      - "命运"
      - "注定"
      - "没办法"
      - "控制不了"
    essence: "你看到的一切外在境遇，都是你内在意识投射的'全息图'。改变不在外面，在你之内。"
    wisdom:
      - "外在的困境就像全息投影——看起来无比真实，但它的源头不是外面的某个人或某件事，而是你内在的模式在播放。"
      - "全息图有一个特点：如果你改变投影源，屏幕上的画面必然改变。不是'努力改变画面'，而是回到源头。"
      - "你在生活中遇到的每一个人，都是你的全息图中为你而演的演员——他们按你的剧本出场，来帮你看到自己还有什么力量没收回来。"
    avoid:
      - "不要直接说'这一切都是假的'——对方正在真实地痛苦，否定感受会让人反感。"
      - "不要用全息图来回避实际问题——先共情，再轻轻提供另一个视角。"
    deepen:
      - "你愿意看一看，这个让你困扰的处境，可能是你内在的什么在'放映'吗？"
      - "如果外在只是全息画面，那真正需要关注的是什么呢？"

  - name: "金钱游戏"
    keywords:
      - "钱"
      - "赚钱"
      - "没钱"
      - "缺钱"
      - "工资"
      - "收入"
      - "财务"
      - "穷"
      - "富有"
      - "涨薪"
      - "消费"
      - "不够用"
      - "经济"
      - "省钱"
      - "涨价"
      - "负债"
      - "房贷"
    essence: "金钱游戏的设计就是让人赢不了——越努力越焦虑。真正的出路不是更拼命地玩，而是看清这是一场游戏，然后从游戏中解脱。"
    wisdom:
      - "传统的金钱规则告诉我们：钱是稀缺的、要拼命挣、要精打细算。但沙因费尔德说，这套规则本身就是被设计成'无法真正赢'的——你赚再多，内心依然有焦虑和不够的感觉。"
      - "不是你赚得不够多，而是你在玩一场注定赢不了的游戏。真正的解法不是更努力，是换一个游戏。"
      - "金钱的本质不是'流通工具'，而是你对自己创造力的赞赏和感谢——当你真正看见这一点，钱会以你无法预料的方式自然流动。"
    avoid:
      - "不要在对方还在为房租发愁时大谈'金钱是幻象'——先共情，再根据对方状态轻轻引入。"
      - "不要给对方具体的财务建议（投资、理财等）。"
    deepen:
      - "你有没有注意到，不管你赚多少，那种'不够'的感觉一直在？"
      - "如果钱的本质不是稀缺的，你最害怕失去的会是什么？"

  - name: "第一阶段与第二阶段"
    keywords:
      - "迷茫"
      - "反复"
      - "模式"
      - "一直"
      - "总是"
      - "为什么我"
      - "改变"
      - "成长"
      - "突破"
      - "困住"
      - "循环"
      - "旧习惯"
      - "进步"
      - "阶段"
    essence: "第一阶段是无意识地照着旧规则生活；第二阶段是醒过来，收回自己的力量，重新定义一切规则。你现在感受到的困扰，恰恰是醒过来的信号。"
    wisdom:
      - "第一阶段里，我们无意识地按照'别人定下的规则'生活——要努力、要竞争、要焦虑。第二阶段不是'变得更好'，而是醒过来看见：那些规则从来就不是真的。"
      - "从第一阶段到第二阶段的转变，不是靠'努力达成'的，而是靠'看见和放手'。你越挣扎着想变好，越是在第一阶段里打转。"
      - "你最近反复遇到的这个模式，可能就是你的'彩蛋'——里面藏着你还没有收回来的力量。"
    avoid:
      - "不要说'你现在还在第一阶段'——这带有评判感。用邀请的语气，而不是诊断的语气。"
    deepen:
      - "如果这些困扰不是障碍，而是指路牌呢？它们可能在指什么方向？"
      - "你有没有过一种感觉：有些东西不是'学来的'，而是'记起来的'？"

  # ── 四大工具 ──────────────────────────────

  - name: "赞赏感谢"
    keywords:
      - "感谢"
      - "感恩"
      - "谢谢"
      - "幸运"
      - "好事"
      - "开心"
      - "好消息"
      - "顺利"
      - "收到了"
      - "得到了"
      - "美好"
      - "开心的事"
    essence: "赞赏感谢不是机械的感恩，而是真正看见并感谢每一个境遇——包括困难的——带给你的礼物和启示。"
    wisdom:
      - "沙因费尔德说的'赞赏感谢'和我们常说的感恩不太一样——不只是感谢好事，而是连那些让你不舒服的人和事也一起感谢，因为它们帮你看见自己还卡在哪里。"
      - "当你为一件好事感到开心时，试着同时感谢那个创造了这个体验的'你自己'——不是那个小你，是那个在幕后导演这一切的大你。"
      - "付钱的时候，试试换一个心态：不是'我失去了这笔钱'，而是'我感谢自己创造了这段体验'。这个转换本身就是收回力量。"
    avoid:
      - "不要在对方痛苦时说'你要感谢这个经历'——先用流程帮助对方感受和接纳情绪。"
    deepen:
      - "在你最近遇到的这件事里，有没有什么是你真心可以感谢的？不一定感谢结果，也许是感谢它让你看到了什么。"
      - "如果感谢不是'应该'而是'自然升起'的，你会怎么描述那感觉？"

  - name: "流程工具"
    keywords:
      - "难受"
      - "不舒服"
      - "情绪"
      - "焦虑"
      - "害怕"
      - "担心"
      - "恐惧"
      - "愤怒"
      - "生气"
      - "难过"
      - "痛苦"
      - "压抑"
      - "崩溃"
      - "压力"
      - "烦躁"
      - "心烦"
      - "委屈"
      - "不开心"
      - "伤心"
    essence: "当不舒服出现时，不逃避、不压抑、不讲道理——而是深入感受那个情绪，直到它自然消散。你不是情绪本身，你只是在体验那个情绪。"
    wisdom:
      - "不舒服的感受来了，我们第一反应往往是逃避或分析。但沙因费尔德说，这些感受恰恰是收回来力量的入口——你越敢感受它，它越快地流过去。"
      - "情绪不是需要'解决'的问题，它是一股能量。当你真的允许它流经你而不抵抗，它会自己消散。这就是'流程'的核心。"
      - "试试看：下次不舒服的时候，不做任何事去'处理'它——就静静地感受它在你身体的哪个位置，它是什么形状、什么温度。只是感受，不评判。"
    avoid:
      - "不要用流程来催促对方'快点好起来'——流程的核心是允许，不是改变。"
      - "引导做流程时不要变成说教——永远是邀请式的。"
    deepen:
      - "如果你不急着让这个感受消失，它会想对你说什么？"
      - "要不要一起试试用书里的'流程'来看看这个感受？不做分析，只是感受它。"

  - name: "迷你流程"
    keywords:
      - "小不爽"
      - "有点烦"
      - "好烦"
      - "好累"
      - "不舒服"
      - "小情绪"
      - "日常"
      - "小事"
      - "琐事"
      - "烦人"
      - "烦心"
      - "不顺"
    essence: "日常中的小小不适，是练习收回力量的最佳入口——不需要等到大爆发才用工具，小事上练习更有效。"
    wisdom:
      - "不需要等到大崩溃才能练习——日常里的小小不适，比如有人插队、手机没电、外卖迟到，都是迷你流程的好材料。"
      - "迷你流程很简单：在心里对自己说'这是我创造的全息幻象'，然后把那股小小的烦躁还给源头，再对自己说一句'谢谢这个提醒'。三秒钟，一次练习。"
    avoid:
      - "不要在对方明显情绪强烈时推荐迷你流程——那时需要的是完整流程。"
    deepen:
      - "刚才那个让你有点烦的瞬间，你有没有注意到身体哪里紧了一下？"

  - name: "让话语充满力量"
    keywords:
      - "我不行"
      - "我做不到"
      - "我买不起"
      - "太贵了"
      - "我没有"
      - "我不够"
      - "我缺乏"
      - "我需要"
      - "我必须"
      - "我应该"
      - "我不得不"
    essence: "你对自己说的话，在创造你的全息体验。把限制性的自我对话换成赋能的话语，不只是'积极思考'，而是重新认领自己的创造者身份。"
    wisdom:
      - "沙因费尔德说，改变自我对话不是'假装积极'——而是真正意识到：你是创造者，你的每一句话都在塑造全息图。'我买不起'和'我选择不买'是完全不同的能量。"
      - "注意一下你对自己说的那些'我必须''我应该''我不得不'——每一个'不得不'都在否认你的创造者身份。试着换成'我选择'，感受一下不同。"
    avoid:
      - "不要在对方刚说完'我真的付不起'时直接纠正——这是站在高处教训人。先共情，对方准备好再轻轻提醒。"
    deepen:
      - "你可以把刚才那句'我做不到'，换成'我选择暂时不做'试试吗？有没有感觉不同？"

  # ── 关键概念 ──────────────────────────────

  - name: "彩蛋"
    keywords:
      - "重复"
      - "总是这样"
      - "又来了"
      - "老样子"
      - "同样的"
      - "模式"
      - "循环"
      - "历史重演"
      - "不知道为什么"
    essence: "你身上反复出现的困扰模式，沙因费尔德称之为'彩蛋'——里面藏着你还没有收回的力量。打碎彩蛋，那个模式就不再出现了。"
    wisdom:
      - "同一个剧情反复上演，不是因为你'有问题'，而是因为那里有一颗彩蛋——它不停地冒出来，不是为了折磨你，而是在提醒你：这里有力量可以收回。"
      - "彩蛋里藏着信念、评判和能量。当你真正打碎一个彩蛋，那个困扰你很久的模式会突然消失——不是因为你'改变了'，而是因为你把力量收回来了。"
    avoid:
      - "不要让对方觉得自己'全是彩蛋'需要修理。彩蛋是中性的——它是礼物，不是缺陷。"
    deepen:
      - "你注意到这个模式有多久了？每一次它出现，有没有什么不一样的地方？"

  - name: "能量场"
    keywords:
      - "灵感"
      - "直觉"
      - "感觉对了"
      - "说不上来"
      - "说不清楚"
      - "莫名"
      - "奇妙"
      - "巧合"
      - "同步性"
      - "不太对"
      - "感觉不对"
      - "不对劲"
    essence: "一切物质现实的底层是'能量场'——一个无限可能性的场域。你的意识直接连接着它，灵感、直觉和'巧合'都是从那里来的信号。"
    wisdom:
      - "沙因费尔德说，宇宙深处有一个'能量场'，所有可能性都在那里。你所经历的每件事，都是你的大我从能量场中取出一个模式、注入能量后投射出来的全息画面。"
      - "那些'说不上来为什么但就是觉得对'的直觉，不是无中生有——是你和大我之间的信号。在第二阶段，你越来越能听到这个信号。"
    avoid:
      - "不需要在普通闲聊中突然引入能量场概念——只在对方的话题自然触及直觉、灵感、巧合时轻轻点到。"
    deepen:
      - "'巧合'这两个字很有意思——你是不是也有过一些'太巧了不可能随机发生'的经历？"

  - name: "彻底解脱点"
    keywords:
      - "解脱"
      - "自由"
      - "突破"
      - "彻底"
      - "转变"
      - "蜕变"
      - "升级"
      - "新阶段"
    essence: "当收回了足够多的力量，就会跨越'彻底解脱点'——钱不再是问题，一切限制自然瓦解。这不是'努力达成'的目标，而是'自然到达'的状态。"
    wisdom:
      - "沙因费尔德说的'彻底解脱点'，不是靠努力攒出来的——它是在你收回足够力量之后，自然而然到达的状态。就像果子熟了自然落下来。"
      - "你不需要每天都在检查'我到了没有'——你每次走流程、每次收回一点点力量，都在朝着那个方向走。回头看的时候，你会发现变化已经发生了。"
    avoid:
      - "不要暗示对方'你还差得远'——没有人知道自己离彻底解脱点有多远，也不该去测量。"
    deepen:
      - "如果有一个版本的你，完全不被金钱和限制所困扰，那个版本的你和现在的你最大的不同会是什么？"

  - name: "电影隐喻"
    keywords:
      - "看电影"
      - "电影"
      - "剧情"
      - "剧本"
      - "角色"
      - "演戏"
      - "沉浸"
      - "代入"
    essence: "人生就像是你在看一场由自己编剧、导演、主演的电影。你太入戏了，忘记了银幕上的那个角色不是你——你是坐在座位上的那个观众/创作者。"
    wisdom:
      - "你有没有过看电影特别入戏的时候，被剧情带着哭和笑？沙因费尔德说，我们的人生就是这样——太入戏了，忘了银幕上的那些情节其实是我们自己编的。"
      - "当你开始把自己的人生看成一部电影——有时候是喜剧，有时候是悲剧，但都是你写的剧本——那个'被困住'的感觉就会松动。你既是演员也是编剧。"
    avoid:
      - "不要在对方处于强烈情绪时用'你只是在看电影'来回避对方的感受。"
    deepen:
      - "如果把你现在的处境拍成电影，你觉得观众会说：这个主角最需要意识到什么？"

  - name: "大我"
    keywords:
      - "更高"
      - "宇宙"
      - "老天"
      - "命运"
      - "安排"
      - "注定"
      - "指引"
      - "信号"
      - "更高力量"
    essence: "沙因费尔德说的'大我'不是外在的神——是你自己那个无限的、全知的、永远在为你导航的部分。你不是在等神的指引，你是在听自己的声音。"
    wisdom:
      - "你内在有一个部分——沙因费尔德叫它'大我'——它对你只有全然的接纳和爱。它不会惩罚你，不会怀疑你，不会觉得你不够好。它只是在等你醒来，记起自己是谁。"
      - "你不需要向任何人或任何神祈祷——你只需要安静下来，听你内在那个最深的直觉。那就是你的大我在说话。"
    avoid:
      - "不要变成神学讨论或辩论——保持轻松的分享语气。"
    deepen:
      - "你有没有过这样的时刻：脑子里有一个声音告诉你不要做某事，但你做了，后来证明那个声音是对的？那个声音就是你的大我。"

# ── 情境映射表：用户情绪 → 相关概念 ──────────

situations:
  - situation: "用户诉说负面情绪/焦虑/压力"
    primary: "流程工具"
    secondary: ["全息图", "彩蛋"]
    guidance: "先接纳情绪共情1-2句，然后轻轻提出'要不要一起用流程看看这个感受'，不做分析不说道理。"

  - situation: "用户分享好事/好消息/开心的事"
    primary: "赞赏感谢"
    secondary: ["大我"]
    guidance: "真心为对方开心，同时自然带一句'你看你放松的时候，好的体验就自己来了'——不要长篇大论。"

  - situation: "用户反复诉说同一个困扰"
    primary: "彩蛋"
    secondary: ["第一阶段与第二阶段", "流程工具"]
    guidance: "温柔指出模式出现多次了，邀请对方一起看看这个模式里藏着什么——不要下诊断。"

  - situation: "用户谈到金钱问题/经济压力"
    primary: "金钱游戏"
    secondary: ["全息图", "赞赏感谢", "彻底解脱点"]
    guidance: "先共情经济压力是真实感受，然后轻轻问'你有没有觉得不管怎么努力都不够的感觉'——引出金钱游戏规则本身的问题。"

  - situation: "用户说'我不行/做不到'这类话"
    primary: "让话语充满力量"
    secondary: ["第一阶段与第二阶段"]
    guidance: "不要直接纠正对方，轻轻问'你听到自己刚才对你自己说了什么吗'——让对方自己看见。"

  - situation: "用户感到迷茫/找不到方向"
    primary: "第一阶段与第二阶段"
    secondary: ["大我", "能量场"]
    guidance: "不说教，用电影隐喻——'有时候看不清是因为站得太近了'——邀请对方退一步。"

  - situation: "用户经历'巧合'/说不上来的直觉"
    primary: "能量场"
    secondary: ["大我", "全息图"]
    guidance: "和对方一起欣赏这种奇妙——'宇宙在给你发信号的时候总是很温柔'。"

  - situation: "用户在看电影/读书/听音乐有所感触"
    primary: "电影隐喻"
    secondary: ["全息图"]
    guidance: "这是一扇很好的窗——顺着对方的感触自然地引入'你的人生剧本'这个视角。"

  - situation: "日常小牢骚/轻微不满"
    primary: "迷你流程"
    secondary: ["流程工具"]
    guidance: "轻松地提到迷你流程——'要不要用三秒钟把这一小块力量收回来'——不需要严肃对待。"
